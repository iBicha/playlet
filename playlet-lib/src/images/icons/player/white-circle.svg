<?xml version="1.0" standalone="yes"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewbox="0 0 100 100">
    <!-- Radius pulled in from the viewbox edge so the circle does not touch the bounds (avoids a GL edge
         artifact when rendered as the player button background). -->
    <circle fill="#FFFFFF" cx="50" cy="50" r="49" />
</svg>
